<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1416">
<title>NutriApp</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%2322c55e'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='white'%3E🍽%3C/text%3E%3C/svg%3E">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --bg:#f7f1e6; --bg2:#efe6d5; --card:#fffdf8; --card2:#f3ecdd; --line:#e8dcc5;
  --txt:#2c2920; --muted:#8d8471; --accent:#1f9d55; --accent-d:#17864a; --accent2:#dd8515;
  --carb:#ef9f28; --prot:#e5604e; --fat:#8b6df0; --kcal:#1f9d55;
  --danger:#e0574a; --ink:#ffffff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);
  background-image:radial-gradient(120% 50% at 100% 0, rgba(31,157,85,.07) 0, transparent 42%),radial-gradient(120% 50% at 0 100%, rgba(221,133,21,.06) 0, transparent 42%);
  background-repeat:no-repeat; color:var(--txt);
  padding-bottom:calc(72px + env(safe-area-inset-bottom));
  -webkit-font-smoothing:antialiased; overscroll-behavior-y:contain;
}
h1,h2,h3{margin:0}
button{font-family:inherit;cursor:pointer;border:none}
.app{max-width:520px;margin:0 auto;min-height:100vh}
header{
  padding:calc(16px + env(safe-area-inset-top)) 18px 12px;
  display:flex;align-items:center;justify-content:space-between;
}
header h1{font-size:23px;font-weight:800;letter-spacing:-.5px}
header h1 .dot{color:var(--accent)}
header .sub{color:var(--muted);font-size:12.5px;margin-top:2px;text-transform:capitalize}
.streak{display:flex;align-items:center;gap:5px;background:linear-gradient(135deg,#fff2dc,#ffe3b8);border:1px solid #f2ce93;color:#c2661a;font-weight:800;font-size:16px;padding:8px 13px;border-radius:99px;box-shadow:0 4px 12px -6px rgba(221,133,21,.5)}
.streak svg{width:15px;height:15px}
.streak.zero{background:var(--card);border-color:var(--line);color:var(--muted);box-shadow:none}
.date-pill{background:var(--card);color:var(--muted);font-size:13px;padding:6px 12px;border-radius:999px;border:1px solid var(--line)}
main{padding:4px 16px 20px}
.view{display:none;animation:fade .25s ease}
.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* Cards */
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px -12px rgba(90,70,30,.35)}
.card h2{font-size:13px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px}

/* Macro summary rings/bars */
.kcal-big{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.kcal-big .num{font-size:40px;font-weight:800;letter-spacing:-1px}
.kcal-big .goal{color:var(--muted);font-size:16px}
.kcal-sub{color:var(--muted);font-size:13px;margin-bottom:14px}
.bar{height:9px;background:var(--card2);border-radius:99px;overflow:hidden;margin:6px 0 2px}
.bar > i{display:block;height:100%;border-radius:99px;transition:width .5s ease}
.macro-row{display:flex;justify-content:space-between;font-size:13px;margin-top:12px}
.macro-row .lbl{display:flex;align-items:center;gap:6px;color:var(--muted)}
.macro-row .lbl b{color:var(--txt);font-weight:600}
.chip{width:10px;height:10px;border-radius:3px;display:inline-block}

/* meal list */
.meal{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.meal:last-child{border-bottom:none}
.meal .emoji{font-size:26px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--card2);border-radius:12px;flex-shrink:0}
.meal .info{flex:1;min-width:0}
.meal .info .name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meal .info .macros{color:var(--muted);font-size:12px;margin-top:2px}
.meal .kc{font-weight:700;font-size:15px;white-space:nowrap}
.meal .del{background:none;color:var(--muted);padding:4px 6px;margin-left:2px;display:flex;align-items:center}
.meal .del svg{width:19px;height:19px}
.empty{color:var(--muted);text-align:center;padding:26px 10px;font-size:14px}
.empty .big{width:42px;height:42px;display:block;margin:0 auto 10px;color:var(--line);opacity:.9;stroke:#c9bda3}

/* buttons */
.btn{background:var(--accent);color:var(--ink);font-weight:700;font-size:16px;padding:15px;border-radius:15px;width:100%;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 18px -8px rgba(31,157,85,.55)}
.btn.sec{background:var(--card2);color:var(--txt);border:1px solid var(--line);box-shadow:none}
.btn.small{padding:10px 14px;font-size:14px;width:auto}
.btn:active{transform:scale(.98)}
.row-btns{display:flex;gap:10px}

/* preset list */
.preset{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}
.preset .emoji{font-size:24px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--card2);border-radius:11px}
.preset .info{flex:1;min-width:0}
.preset .info .name{font-weight:600}
.preset .info .macros{color:var(--muted);font-size:12px;margin-top:2px}
.preset .add{background:var(--accent);color:var(--ink);font-weight:800;font-size:22px;width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.preset .edit{background:none;color:var(--muted);font-size:17px;padding:6px}

/* nav */
nav{position:fixed;bottom:0;left:0;right:0;background:#fffdf8;border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -6px 20px -12px rgba(90,70,30,.3)}
nav .tab{flex:1;background:none;color:var(--muted);padding:11px 0 9px;display:flex;flex-direction:column;align-items:center;gap:4px;font-size:11px;font-weight:600;transition:color .2s}
nav .tab .ic{width:23px;height:23px;stroke-width:2;transition:transform .2s}
nav .tab.active{color:var(--accent)}
nav .tab.active .ic{transform:translateY(-1px) scale(1.08)}

/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(40,30,15,.45);display:none;align-items:flex-end;z-index:50}
.modal-bg.open{display:flex}
.modal{background:var(--card);width:100%;max-width:520px;margin:0 auto;border-radius:22px 22px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:92vh;overflow:auto;animation:up .28s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.modal h3{font-size:19px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal h3 .x{background:none;color:var(--muted);font-size:24px}
label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px;font-weight:600}
input,select{width:100%;background:var(--card2);border:1px solid var(--line);color:var(--txt);padding:13px;border-radius:12px;font-size:16px;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mt{margin-top:18px}
.emoji-pick{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.emoji-pick button{background:var(--card2);border:1px solid var(--line);font-size:22px;width:44px;height:44px;border-radius:11px}
.emoji-pick button.sel{border-color:var(--accent);background:rgba(31,157,85,.14);box-shadow:0 0 0 2px rgba(31,157,85,.25)}

/* scanner */
#reader{width:100%;border-radius:16px;overflow:hidden;margin-bottom:12px}
#reader video{border-radius:16px}
.scan-hint{color:var(--muted);font-size:13px;text-align:center;margin-bottom:12px}

/* stats */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}
.stat .v{font-size:26px;font-weight:800}
.stat .l{color:var(--muted);font-size:12px;margin-top:2px}
.stat .cmp{font-size:12px;font-weight:700;margin-top:6px}
.up{color:var(--accent)} .down{color:var(--danger)}
.week-bars{display:flex;align-items:flex-end;gap:6px;height:110px;margin:8px 0 4px}
.week-bars .d{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
.week-bars .d .col{width:70%;background:var(--card2);border-radius:6px 6px 0 0;min-height:3px;transition:height .5s;position:relative}
.week-bars .d .col.over{background:var(--danger)}
.week-bars .d .col.ok{background:var(--accent)}
.week-bars .d .lab{font-size:10px;color:var(--muted)}
.hint{background:var(--card2);border-left:3px solid var(--accent);padding:11px 12px;border-radius:8px;font-size:13px;margin-bottom:9px;line-height:1.4}
.hint.warn{border-color:var(--carb)}
.hint.bad{border-color:var(--danger)}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--txt);color:#fff;font-weight:700;padding:12px 20px;border-radius:99px;font-size:14px;opacity:0;transition:.3s;z-index:100;pointer-events:none;white-space:nowrap;box-shadow:0 10px 30px -8px rgba(0,0,0,.4)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.link{color:var(--accent2);font-size:13px;background:none;padding:0;text-decoration:underline}
.seg{display:flex;background:var(--card2);border-radius:12px;padding:3px;margin-bottom:14px}
.seg button{flex:1;background:none;color:var(--muted);padding:9px;border-radius:9px;font-weight:600;font-size:14px}
.seg button.sel{background:var(--accent);color:var(--ink)}

/* onboarding tutorial — hero card */
.onboard{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(130% 75% at 50% 0%, rgba(31,157,85,.28) 0, transparent 55%), rgba(22,16,6,.8);padding:24px}
.onboard.open{display:flex}
.ob-card{position:relative;width:min(358px,88vw);background:var(--card);border:1px solid var(--line);border-radius:26px;
  overflow:hidden;cursor:pointer;user-select:none;box-shadow:0 36px 72px -24px rgba(30,20,5,.7)}
.ob-hero{position:relative;height:130px;background:linear-gradient(135deg,#1b8f4c 0%,#31c06d 52%,#e3a72c 100%);display:flex;align-items:center;justify-content:center}
.ob-hero::after{content:'';position:absolute;inset:0;background:radial-gradient(120% 120% at 50% 135%, rgba(255,255,255,.3),transparent 55%)}
.ob-badge{position:relative;z-index:1;width:80px;height:80px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 26px -8px rgba(0,0,0,.4)}
.ob-badge svg{width:40px;height:40px;fill:none;stroke:var(--accent-d);stroke-width:1.85;stroke-linecap:round;stroke-linejoin:round}
.ob-body{padding:24px 24px 26px;text-align:center}
.ob-body h2{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-bottom:10px;color:var(--txt)}
.ob-body p{color:#6b6252;font-size:15px;line-height:1.55;margin:0}
.ob-body p b{color:var(--txt);font-weight:700}
.soon{display:inline-block;font-size:10.5px;background:var(--accent);color:#fff;padding:3px 9px;border-radius:99px;vertical-align:middle;font-weight:800;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}
.ob-note{margin-top:16px;background:#fdf0d9;border:1px solid #f0cf94;color:#7a4e10;padding:12px 14px;border-radius:14px;font-size:13px;line-height:1.5;text-align:left}
.ob-note b{color:#5a3700}
.ob-card.out{animation:obOut .2s ease forwards}
.ob-card.in{animation:obIn .34s cubic-bezier(.16,.84,.3,1)}
@keyframes obOut{to{opacity:0;transform:translateX(-38px) scale(.96)}}
@keyframes obIn{from{opacity:0;transform:translateX(40px) scale(.96)}to{opacity:1;transform:none}}
.ob-dots{display:flex;gap:8px;justify-content:center;margin:26px 0 20px}
.ob-dots i{width:7px;height:7px;border-radius:99px;background:rgba(255,255,255,.4);transition:.35s}
.ob-dots i.on{background:#fff;width:22px}
.ob-actions{display:flex;align-items:center;gap:14px;width:min(358px,88vw)}
.ob-skip{background:none;color:rgba(255,255,255,.85);font-size:15px;font-weight:600;padding:13px 8px}
.ob-actions .btn{flex:1;width:auto}
.ob-tap{margin-top:14px;color:var(--muted);font-size:12px;opacity:.6}

/* calorie ring */
.summary{display:flex;flex-direction:column;align-items:center;padding-top:20px}
.ring-wrap{position:relative;width:186px;height:186px;margin:2px auto 6px}
.ring{width:186px;height:186px;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--card2);stroke-width:13}
.ring-fg{fill:none;stroke:var(--kcal);stroke-width:13;stroke-linecap:round;stroke-dasharray:326.7;stroke-dashoffset:326.7;transition:stroke-dashoffset .8s cubic-bezier(.34,1.2,.4,1),stroke .3s;filter:drop-shadow(0 3px 6px rgba(31,157,85,.3))}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-center .num{font-size:46px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.ring-center .unit{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700}
.ring-center .goal{font-size:13px;color:var(--muted);margin-top:5px}
.kcal-sub{color:var(--muted);font-size:13.5px;margin-top:10px;font-weight:600}
.macros-mini{display:flex;gap:12px;width:100%;margin-top:18px}
.macros-mini .mini{flex:1;text-align:center;cursor:pointer}
.macros-mini .mini .ml{font-size:11px}
.macros-mini .mini .mbar{height:7px;background:var(--card2);border-radius:99px;overflow:hidden;margin-bottom:7px}
.macros-mini .mini .mbar i{display:block;height:100%;border-radius:99px;transition:width .7s cubic-bezier(.34,1.1,.5,1)}
.macros-mini .mini .ml{font-size:11px;color:var(--muted);display:block}
.macros-mini .mini .mv{font-size:14.5px;font-weight:700;display:block;margin-top:1px}

/* quick access */
.quick-row{display:flex;gap:10px;overflow-x:auto;padding:2px 2px 4px;-webkit-overflow-scrolling:touch}
.quick-row::-webkit-scrollbar{display:none}
.quick-chip{flex:0 0 auto;width:92px;background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:12px 8px 10px;display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .15s,border-color .15s}
.quick-chip .qe{font-size:26px;line-height:1}
.quick-chip .qn{font-size:11.5px;font-weight:600;text-align:center;line-height:1.15;height:27px;overflow:hidden;color:var(--txt)}
.quick-chip .qk{font-size:10.5px;color:var(--muted);font-weight:600}
.quick-chip:active{transform:scale(.94);border-color:var(--accent)}
.quick-chip .qadd{position:absolute}

/* quality analyzer + nutrient info */
.q-head{display:flex;align-items:center;gap:14px;margin-bottom:16px}
.q-score{width:66px;height:66px;border-radius:50%;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:24px;font-weight:800;line-height:1;flex-shrink:0;box-shadow:0 8px 20px -8px rgba(0,0,0,.35)}
.q-score small{font-size:10px;font-weight:600;opacity:.85;margin-top:1px}
.q-cat{font-size:19px;font-weight:800;letter-spacing:-.3px}
.q-name{font-size:13px;color:var(--muted);margin-top:2px}
.q-rows{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:6px}
.q-row{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted)}
.q-row b{color:var(--txt);font-weight:700;font-size:14px}
.q-sub{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin:16px 0 8px}
.q-adds{display:flex;flex-direction:column;gap:7px}
.add-chip{display:flex;align-items:center;gap:8px;padding:9px 11px;border-radius:11px;font-size:13px;border:1px solid}
.add-chip b{font-weight:800}
.add-chip span{margin-left:auto;font-size:11px;font-weight:700}
.add-chip.alto{background:rgba(224,87,74,.1);border-color:rgba(224,87,74,.35);color:#a83224}
.add-chip.alto span{color:#e0574a}
.add-chip.moderado{background:rgba(239,159,40,.12);border-color:rgba(239,159,40,.4);color:#8a5b16}
.add-chip.moderado span{color:#d98a1f}
.add-chip.limitado{background:var(--card2);border-color:var(--line);color:var(--muted)}
.add-ok{background:rgba(31,157,85,.1);border:1px solid rgba(31,157,85,.3);color:var(--accent-d);padding:11px;border-radius:11px;font-size:13px;font-weight:600;text-align:center}
.q-levels{display:flex;gap:8px;flex-wrap:wrap}
.q-levels .lvl{flex:1;min-width:calc(50% - 4px);background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--muted)}
.q-levels .lvl b{font-size:14px}
.q-macros{margin-top:16px;background:var(--card2);border-radius:12px;padding:12px;font-size:13px;color:var(--muted);text-align:center}
.q-macros b{color:var(--txt)}
.q-disc{margin-top:14px;font-size:11.5px;color:var(--muted);text-align:center;line-height:1.4;opacity:.85}
.info-dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:8px;vertical-align:middle}
.info-p{background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:13px 15px;font-size:14px;line-height:1.5;color:var(--txt);margin-bottom:10px}
.info-p b{color:var(--accent-d);font-weight:700}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>Nutri<span class="dot">·</span>App</h1>
      <div class="sub" id="todaySub">Hoy</div>
    </div>
    <div class="streak zero" id="streakPill">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2c1 3-1 4.5-1 6 0 1.4 1 2.3 2 2.3 1.3 0 2-1 2-2.3 2 1.5 3 4 3 6.2A6.6 6.6 0 0 1 5.4 14c0-2 .8-3.6 2.1-5C8.8 7.6 10.5 6.4 12 2z"/></svg>
      <b id="streakNum">0</b>
    </div>
  </header>

  <main>
    <!-- ===== HOY ===== -->
    <section class="view active" id="view-hoy">
      <div class="card summary">
        <div class="ring-wrap">
          <svg class="ring" viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="52"/>
            <circle class="ring-fg" id="kcRing" cx="60" cy="60" r="52"/>
          </svg>
          <div class="ring-center">
            <span class="num" id="kcNum">0</span>
            <span class="unit">kcal</span>
            <span class="goal" id="kcGoal">de 2000</span>
          </div>
        </div>
        <div class="kcal-sub" id="kcSub">Te quedan 2000 kcal</div>
        <div class="macros-mini">
          <div class="mini" onclick="openNutrientInfo('carb')"><div class="mbar"><i id="cBar" style="width:0;background:var(--carb)"></i></div><span class="ml">Hidratos ⓘ</span><span class="mv" id="mCarb">0g</span></div>
          <div class="mini" onclick="openNutrientInfo('prot')"><div class="mbar"><i id="pBar" style="width:0;background:var(--prot)"></i></div><span class="ml">Proteína ⓘ</span><span class="mv" id="mProt">0g</span></div>
          <div class="mini" onclick="openNutrientInfo('grasas')"><div class="mbar"><i id="fBar" style="width:0;background:var(--fat)"></i></div><span class="ml">Grasas ⓘ</span><span class="mv" id="mFat">0g</span></div>
        </div>
      </div>

      <div id="quickWrap"></div>

      <div class="card">
        <h2>Comidas de hoy</h2>
        <div id="mealList"></div>
      </div>

      <button class="btn" onclick="openAddPicker()">＋ Añadir comida</button>
    </section>

    <!-- ===== MIS PLATOS ===== -->
    <section class="view" id="view-platos">
      <div class="card" style="margin-bottom:12px">
        <input id="presetSearch" placeholder="Buscar plato…" oninput="renderPresets()">

<script>
/* ---------- Storage ---------- */
const DB = {
  presets: load('na_presets', null),
  log: load('na_log', []),
  goals: load('na_goals', {kcal:2000, carb:250, prot:120, fat:65}),
};
function load(k,def){try{const v=localStorage.getItem(k);return v?JSON.parse(v):def;}catch(e){return def;}}
function save(){localStorage.setItem('na_presets',JSON.stringify(DB.presets));localStorage.setItem('na_log',JSON.stringify(DB.log));localStorage.setItem('na_goals',JSON.stringify(DB.goals));}

/* seed example presets first run */
if(DB.presets===null){
  DB.presets=[
    {id:uid(),name:'Plato de migas',emoji:'🍳',unit:'serving',kcal:520,carb:60,prot:14,fat:24},
    {id:uid(),name:'Macarrones boloñesa',emoji:'🍝',unit:'serving',kcal:600,carb:75,prot:25,fat:20},
    {id:uid(),name:'Pechuga empanada',emoji:'🍗',unit:'serving',kcal:330,carb:18,prot:35,fat:12},
    {id:uid(),name:'Plátano',emoji:'🍌',unit:'serving',kcal:105,carb:27,prot:1.3,fat:.4},
  ];
  save();
}

/* ---------- Utils ---------- */
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function today(){return new Date().toISOString().slice(0,10);}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1800);}
function r(n){return Math.round(n);}
function r1(n){return Math.round(n*10)/10;}

/* ---------- Navigation ---------- */
let current='hoy';
function go(v){
  if(current==='scan'&&v!=='scan') stopScan();
  current=v;
  document.querySelectorAll('.view').forEach(s=>s.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  document.querySelectorAll('nav .tab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
  if(v==='hoy')renderHoy();
  if(v==='platos')renderPresets();
  if(v==='stats')renderStats();
}

/* ---------- HOY ---------- */
function todaysMeals(){return DB.log.filter(e=>e.date===today());}
function sumMacros(entries){return entries.reduce((a,e)=>({kcal:a.kcal+e.kcal,carb:a.carb+e.carb,prot:a.prot+e.prot,fat:a.fat+e.fat}),{kcal:0,carb:0,prot:0,fat:0});}
function renderHoy(){
  document.getElementById('todaySub').textContent=new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'short'});
  renderStreak();
  const m=todaysMeals();const s=sumMacros(m);const g=DB.goals;
  document.getElementById('kcNum').textContent=r(s.kcal);
  document.getElementById('kcGoal').textContent='de '+g.kcal;
  const left=g.kcal-s.kcal;
  document.getElementById('kcSub').textContent= left>=0?('Te quedan '+r(left)+' kcal'):('Te has pasado '+r(-left)+' kcal');
  const C=326.7,pct=Math.min(1,g.kcal>0?s.kcal/g.kcal:0);
  const ring=document.getElementById('kcRing');
  ring.style.strokeDashoffset=(C*(1-pct)).toFixed(1);
  ring.style.stroke=left>=0?'var(--kcal)':'var(--danger)';
  document.getElementById('mCarb').textContent=r(s.carb)+'g';
  document.getElementById('mProt').textContent=r(s.prot)+'g';
  document.getElementById('mFat').textContent=r(s.fat)+'g';
  document.getElementById('cBar').style.width=Math.min(100,s.carb/g.carb*100)+'%';
  document.getElementById('pBar').style.width=Math.min(100,s.prot/g.prot*100)+'%';
  document.getElementById('fBar').style.width=Math.min(100,s.fat/g.fat*100)+'%';
  renderQuick();

  const list=document.getElementById('mealList');
  if(m.length===0){list.innerHTML='<div class="empty"><svg class="big" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.5"/></svg>Aún no has registrado nada hoy.<br>Pulsa «Añadir comida».</div>';return;}
  list.innerHTML=m.map(e=>`
    <div class="meal">
      <div class="emoji">${e.emoji||'🍽️'}</div>
      <div class="info"><div class="name">${esc(e.name)}</div>
        <div class="macros">${r(e.carb)}g H · ${r(e.prot)}g P · ${r(e.fat)}g G${e.qty?' · '+e.qty:''}</div></div>
      <div class="kc">${r(e.kcal)}</div>
      <button class="del" onclick="delEntry('${e.id}')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5.5A1.5 1.5 0 0 1 10.5 4h3A1.5 1.5 0 0 1 15 5.5V7M6.5 7l.8 12a1.5 1.5 0 0 0 1.5 1.4h6.4a1.5 1.5 0 0 0 1.5-1.4l.8-12"/></svg></button>
    </div>`).join('');
}
function delEntry(id){DB.log=DB.log.filter(e=>e.id!==id);save();renderHoy();}
function esc(s){return String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));}

/* ---------- Racha (streak) ---------- */
function streak(){
  const days=new Set(DB.log.map(e=>e.date));
  let n=0,d=new Date();
  if(!days.has(dayStr(d))) d.setDate(d.getDate()-1);
  while(days.has(dayStr(d))){n++;d.setDate(d.getDate()-1);}
  return n;
}
function renderStreak(){
  const n=streak();
  document.getElementById('streakNum').textContent=n;
  document.getElementById('streakPill').classList.toggle('zero',n===0);
}

/* ---------- Accesos rápidos ---------- */
function topPresets(){
  const counts={};
  DB.log.forEach(e=>{counts[e.name]=(counts[e.name]||0)+1;});
  return [...DB.presets].sort((a,b)=>(counts[b.name]||0)-(counts[a.name]||0)).slice(0,6);
}
function renderQuick(){
  const list=topPresets();
  const wrap=document.getElementById('quickWrap');
  if(!list.length){wrap.innerHTML='';return;}
  wrap.innerHTML=`<div class="card"><h2>Tus platos de siempre</h2><div class="quick-row">`+
    list.map(p=>`<button class="quick-chip" onclick="quickAdd('${p.id}')">
      <span class="qe">${p.emoji||'🍽️'}</span>
      <span class="qn">${esc(p.name)}</span>
      <span class="qk">${r(p.kcal)} kcal</span></button>`).join('')+`</div></div>`;
}
function quickAdd(id){
  const p=DB.presets.find(x=>x.id===id);if(!p)return;
  DB.log.push({id:uid(),date:today(),name:p.name,emoji:p.emoji,
    qty:p.unit==='100g'?'100 g':'1 ración',kcal:p.kcal,carb:p.carb,prot:p.prot,fat:p.fat});
  save();renderHoy();toast('✓ '+p.name);
}

/* ---------- ADD PICKER ---------- */
function openAddPicker(){document.getElementById('pickerSearch').value='';renderPicker();openModal('modalPicker');}
function renderPicker(){
  const q=document.getElementById('pickerSearch').value.toLowerCase();
  const list=DB.presets.filter(p=>p.name.toLowerCase().includes(q));
  document.getElementById('pickerList').innerHTML=list.map(p=>presetRow(p,true)).join('')||'<div class="empty">Sin resultados</div>';
}
function presetRow(p,picker){
  const per=p.unit==='100g'?' /100g':'';
  return `<div class="preset">
    <div class="emoji">${p.emoji||'🍽️'}</div>
    <div class="info"><div class="name">${esc(p.name)}</div>
      <div class="macros">${r(p.kcal)} kcal${per} · ${r(p.carb)}H ${r(p.prot)}P ${r(p.fat)}G</div></div>
    ${picker?`<button class="add" onclick="chooseQty('${p.id}')">＋</button>`
            :`<button class="edit" onclick="openPresetForm('${p.id}')">✏️</button><button class="add" onclick="chooseQty('${p.id}')">＋</button>`}
  </div>`;
}
function chooseQty(id){
  const p=DB.presets.find(x=>x.id===id);if(!p)return;
  closeModal('modalPicker');
  document.getElementById('addTitle').textContent=p.name;
  const body=document.getElementById('addBody');
  if(p.unit==='100g'){
    body.innerHTML=`
      <label>Cantidad (gramos)</label>
      <input id="qtyG" type="number" inputmode="numeric" value="100">
      <div class="macro-row" style="margin-top:10px"><span class="lbl">Se registrará:</span></div>
      <div id="qtyPreview" class="kcal-sub"></div>
      <button class="btn mt" onclick="confirmAdd('${id}')">Añadir a hoy</button>`;
    const upd=()=>{const g=+document.getElementById('qtyG').value||0;const f=g/100;
      document.getElementById('qtyPreview').textContent=`${r(p.kcal*f)} kcal · ${r(p.carb*f)}g H · ${r(p.prot*f)}g P · ${r(p.fat*f)}g G`;};
    setTimeout(()=>{document.getElementById('qtyG').oninput=upd;upd();},30);
  } else {
    body.innerHTML=`
      <label>Nº de raciones</label>
      <input id="qtyN" type="number" inputmode="decimal" value="1" step="0.5">
      <div id="qtyPreview" class="kcal-sub" style="margin-top:10px"></div>
      <button class="btn mt" onclick="confirmAdd('${id}')">Añadir a hoy</button>`;
    const upd=()=>{const n=+document.getElementById('qtyN').value||0;
      document.getElementById('qtyPreview').textContent=`${r(p.kcal*n)} kcal · ${r(p.carb*n)}g H · ${r(p.prot*n)}g P · ${r(p.fat*n)}g G`;};
    setTimeout(()=>{document.getElementById('qtyN').oninput=upd;upd();},30);
  }
  openModal('modalAdd');
}
function confirmAdd(id){
  const p=DB.presets.find(x=>x.id===id);if(!p)return;
  let f=1,qty='';
  if(p.unit==='100g'){const g=+document.getElementById('qtyG').value||0;f=g/100;qty=g+' g';}
  else{const n=+document.getElementById('qtyN').value||0;f=n;qty=n+(n===1?' ración':' raciones');}
  DB.log.push({id:uid(),date:today(),name:p.name,emoji:p.emoji,qty,kcal:p.kcal*f,carb:p.carb*f,prot:p.prot*f,fat:p.fat*f});
  save();closeModal('modalAdd');go('hoy');toast('✓ Añadido a hoy');
}

/* ---------- PRESETS (Mis platos) ---------- */
function renderPresets(){
  const q=(document.getElementById('presetSearch').value||'').toLowerCase();
  const list=DB.presets.filter(p=>p.name.toLowerCase().includes(q));
  document.getElementById('presetList').innerHTML=list.map(p=>presetRow(p,false)).join('')||'<div class="empty">No tienes platos. Crea uno abajo.</div>';
}
const EMOJIS=['🍽️','🍳','🍝','🍗','🍌','🥗','🍚','🍔','🌮','🥪','🍕','🥩','🐟','🥘','🍲','🥛','🍎','☕','🧀','🥚'];
let editingId=null;
function openPresetForm(id){
  editingId=id||null;
  const p=id?DB.presets.find(x=>x.id===id):null;
  document.getElementById('formTitle').textContent=p?'Editar plato':'Nuevo plato';
  document.getElementById('fName').value=p?p.name:'';
  document.getElementById('fUnit').value=p?p.unit:'serving';
  document.getElementById('fKcal').value=p?p.kcal:'';
  document.getElementById('fCarb').value=p?p.carb:'';
  document.getElementById('fProt').value=p?p.prot:'';
  document.getElementById('fFat').value=p?p.fat:'';
  selEmoji=p?p.emoji:'🍽️';
  document.getElementById('emojiPick').innerHTML=EMOJIS.map(e=>`<button class="${e===selEmoji?'sel':''}" onclick="pickEmoji('${e}',this)">${e}</button>`).join('');
  document.getElementById('delPresetBtn').style.display=p?'block':'none';
  openModal('modalForm');
}
let selEmoji='🍽️';
function pickEmoji(e,el){selEmoji=e;document.querySelectorAll('#emojiPick button').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');}
function savePreset(){
  const name=document.getElementById('fName').value.trim();
  if(!name){toast('Ponle un nombre');return;}
  const data={name,emoji:selEmoji,unit:document.getElementById('fUnit').value,
    kcal:+document.getElementById('fKcal').value||0,carb:+document.getElementById('fCarb').value||0,
    prot:+document.getElementById('fProt').value||0,fat:+document.getElementById('fFat').value||0};
  if(editingId){Object.assign(DB.presets.find(x=>x.id===editingId),data);}
  else{DB.presets.unshift({id:uid(),...data});}
  save();closeModal('modalForm');renderPresets();toast('✓ Plato guardado');
}
function deletePreset(){
  if(!editingId)return;
  DB.presets=DB.presets.filter(x=>x.id!==editingId);save();closeModal('modalForm');renderPresets();toast('Plato eliminado');
}

/* ---------- SCANNER ---------- */
let scanner=null,scanning=false;
function toggleScan(){scanning?stopScan():startScan();}
async function startScan(){
  const btn=document.getElementById('scanToggle');
  if(!window.Html5Qrcode){toast('Cargando… reintenta');return;}
  try{
    scanner=new Html5Qrcode('reader',{formatsToSupport:[
      Html5QrcodeSupportedFormats.EAN_13,Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.CODE_128]});
    await scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:260,height:160}},
      code=>{stopScan();lookup(code);},()=>{});
    scanning=true;btn.textContent='⏸ Detener';
    document.getElementById('scanHint').textContent='Enfoca el código de barras…';
  }catch(e){
    document.getElementById('scanHint').textContent='⚠️ No se pudo abrir la cámara. Requiere HTTPS y permiso. Usa la búsqueda manual.';
  }
}
async function stopScan(){
  if(scanner&&scanning){try{await scanner.stop();scanner.clear();}catch(e){}}
  scanning=false;const btn=document.getElementById('scanToggle');if(btn)btn.textContent='▶ Iniciar cámara';
}
function lookupManual(){const c=document.getElementById('manualCode').value.trim();if(c)lookup(c);}
let lastProduct=null,lastCode=null;
async function lookup(code){
  toast('Analizando '+code+'…');
  try{
    const fields='product_name,brands,nutriments,nutriscore_grade,nova_group,additives_tags,labels_tags,nutrient_levels';
    const res=await fetch(`https://world.openfoodfacts.org/api/v2/product/${code}.json?fields=${fields}`);
    const j=await res.json();
    if(j.status!==1||!j.product){toast('Producto no encontrado');return;}
    showProductResult(j.product,code);
  }catch(e){toast('Error de red');}
}

/* ---------- Analizador de calidad (estilo Yuka) ---------- */
const ADDITIVE_RISK={
  e102:'alto',e104:'alto',e110:'alto',e122:'alto',e124:'alto',e129:'alto',e171:'alto',
  e250:'alto',e251:'alto',e252:'alto',e320:'alto',e321:'alto',
  e210:'moderado',e211:'moderado',e212:'moderado',e213:'moderado',
  e220:'moderado',e221:'moderado',e222:'moderado',e223:'moderado',e224:'moderado',e228:'moderado',
  e621:'moderado',e622:'moderado',e623:'moderado',
  e950:'moderado',e951:'moderado',e952:'moderado',e954:'moderado',
  e407:'limitado',e433:'limitado',e466:'limitado',e471:'limitado',e150c:'limitado',e150d:'limitado',
};
const ADDITIVE_NAME={
  e102:'Tartrazina',e104:'Amarillo de quinoleína',e110:'Amarillo ocaso',e122:'Azorrubina',e124:'Rojo cochinilla',e129:'Rojo allura',
  e171:'Dióxido de titanio',e250:'Nitrito sódico',e251:'Nitrato sódico',e252:'Nitrato potásico',e320:'BHA',e321:'BHT',
  e210:'Ácido benzoico',e211:'Benzoato sódico',e220:'Dióxido de azufre',e621:'Glutamato (MSG)',
  e951:'Aspartamo',e950:'Acesulfamo K',e952:'Ciclamato',e954:'Sacarina',e407:'Carragenanos',e471:'Mono/diglicéridos',
};
function novaLabel(n){return {1:'Sin procesar',2:'Poco procesado',3:'Procesado',4:'Ultraprocesado'}[n]||'—';}
function riskLabel(r){return {alto:'Riesgo alto',moderado:'Riesgo moderado',limitado:'Riesgo limitado'}[r]||'';}
function qualityScore(p){
  const grade=(p.nutriscore_grade||'').toLowerCase();
  const nutriMap={a:100,b:80,c:55,d:30,e:10};
  const nutrition=(grade in nutriMap)?nutriMap[grade]:null;
  const tags=(p.additives_tags||[]).map(t=>t.replace(/^en:/,'').split('-')[0]);
  let pen=0;const flagged=[];
  tags.forEach(c=>{const risk=ADDITIVE_RISK[c];
    if(risk==='alto'){pen+=28;flagged.push({code:c,risk});}
    else if(risk==='moderado'){pen+=14;flagged.push({code:c,risk});}
    else if(risk==='limitado'){pen+=5;flagged.push({code:c,risk});}});
  const additivesScore=Math.max(0,100-pen);
  const organic=(p.labels_tags||[]).some(t=>/organic|ecolog|(^|:)bio$/.test(t));
  let score = nutrition===null ? additivesScore*0.85+(organic?100:50)*0.15
                               : nutrition*0.6+additivesScore*0.3+(organic?100:50)*0.1;
  score=Math.round(Math.max(0,Math.min(100,score)));
  let cat,color;
  if(score>=75){cat='Excelente';color='#1f9d55';}
  else if(score>=50){cat='Bueno';color='#8bbf3c';}
  else if(score>=25){cat='Mediocre';color='#ef9f28';}
  else{cat='Malo';color='#e0574a';}
  return {score,cat,color,grade,nova:p.nova_group,organic,flagged,addN:tags.length,levels:p.nutrient_levels||{}};
}
function renderLevels(lv){
  const map=[['sugars','Azúcar','azucar'],['salt','Sal','sal'],['saturated-fat','Grasas saturadas','grasas'],['fat','Grasas','grasas']];
  const items=map.filter(([k])=>lv[k]).map(([k,label,info])=>{
    const v=lv[k],c=v==='low'?'#1f9d55':v==='moderate'?'#ef9f28':'#e0574a',t=v==='low'?'Bajo':v==='moderate'?'Medio':'Alto';
    return `<button class="lvl" onclick="openNutrientInfo('${info}')"><span>${label}</span><b style="color:${c}">${t}</b></button>`;});
  return items.length?`<h4 class="q-sub">Niveles (toca para saber más)</h4><div class="q-levels">${items.join('')}</div>`:'';
}
function showProductResult(p,code){
  lastProduct=p;lastCode=code;
  const n=p.nutriments||{};
  const name=[p.product_name,p.brands?('('+p.brands.split(',')[0]+')'):''].filter(Boolean).join(' ')||('Producto '+code);
  const q=qualityScore(p);
  const addHtml=q.flagged.length
    ? q.flagged.map(f=>`<div class="add-chip ${f.risk}"><b>${f.code.toUpperCase()}</b> ${ADDITIVE_NAME[f.code]||'Aditivo'}<span>${riskLabel(f.risk)}</span></div>`).join('')
    : '<div class="add-ok">✓ Sin aditivos preocupantes</div>';
  document.getElementById('qualityBody').innerHTML=`
    <div class="q-head">
      <div class="q-score" style="background:${q.color}">${q.score}<small>/100</small></div>
      <div class="q-head-txt"><div class="q-cat" style="color:${q.color}">${q.cat}</div><div class="q-name">${esc(name)}</div></div>
    </div>
    <div class="q-rows">
      <div class="q-row"><span>Nutri-Score</span><b>${q.grade?q.grade.toUpperCase():'—'}</b></div>
      <div class="q-row"><span>Procesamiento</span><b>${novaLabel(q.nova)}</b></div>
      <div class="q-row"><span>Aditivos</span><b>${q.addN}</b></div>
      <div class="q-row"><span>Ecológico</span><b>${q.organic?'Sí':'No'}</b></div>
    </div>
    <h4 class="q-sub">Aditivos a vigilar</h4>
    <div class="q-adds">${addHtml}</div>
    ${renderLevels(q.levels)}
    <div class="q-macros">Por 100 g: <b>${r(n['energy-kcal_100g']||0)} kcal</b> · ${r(n['carbohydrates_100g']||0)}g H · ${r(n['proteins_100g']||0)}g P · ${r(n['fat_100g']||0)}g G</div>
    <button class="btn mt" onclick="saveScannedProduct()">Guardar como plato</button>
    <div class="q-disc">Puntuación orientativa basada en Nutri-Score, nivel de procesado y aditivos (datos de Open Food Facts).</div>`;
  openModal('modalQuality');
}
function saveScannedProduct(){
  const p=lastProduct,n=p.nutriments||{};
  const name=[p.product_name,p.brands?('('+p.brands.split(',')[0]+')'):''].filter(Boolean).join(' ')||('Producto '+lastCode);
  closeModal('modalQuality');
  prefillFromProduct({name,kcal:n['energy-kcal_100g']||0,carb:n['carbohydrates_100g']||0,prot:n['proteins_100g']||0,fat:n['fat_100g']||0});
}

/* ---------- STATS ---------- */
let statRange='week';
function setStatRange(r){statRange=r;document.getElementById('segWeek').classList.toggle('sel',r==='week');document.getElementById('segDay').classList.toggle('sel',r==='day');renderStats();}
function dayStr(d){return d.toISOString().slice(0,10);}
function macrosForDate(ds){return sumMacros(DB.log.filter(e=>e.date===ds));}
function renderStats(){
  document.getElementById('gKcal').value=DB.goals.kcal;
  document.getElementById('gCarb').value=DB.goals.carb;
  document.getElementById('gProt').value=DB.goals.prot;
  document.getElementById('gFat').value=DB.goals.fat;
  const body=document.getElementById('statsBody');
  const g=DB.goals;
  if(statRange==='day'){
    const s=macrosForDate(today());
    body.innerHTML=statCards(s,g,1)+deficits(s,g,1);
    return;
  }
  // week: last 7 days incl today
  const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(dayStr(d));}
  const perDay=days.map(macrosForDate);
  const wk=perDay.reduce((a,b)=>({kcal:a.kcal+b.kcal,carb:a.carb+b.carb,prot:a.prot+b.prot,fat:a.fat+b.fat}),{kcal:0,carb:0,prot:0,fat:0});
  // previous 7 days
  const pdays=[];for(let i=13;i>=7;i--){const d=new Date();d.setDate(d.getDate()-i);pdays.push(dayStr(d));}
  const prevWk=pdays.map(macrosForDate).reduce((a,b)=>({kcal:a.kcal+b.kcal,carb:a.carb+b.carb,prot:a.prot+b.prot,fat:a.fat+b.fat}),{kcal:0,carb:0,prot:0,fat:0});
  const avg={kcal:wk.kcal/7,carb:wk.carb/7,prot:wk.prot/7,fat:wk.fat/7};
  const maxK=Math.max(g.kcal,...perDay.map(d=>d.kcal),1);
  const dl=['L','M','X','J','V','S','D'];
  const todayIdx=(new Date().getDay()+6)%7;
  const bars=perDay.map((d,i)=>{
    const h=Math.max(3,d.kcal/maxK*100);
    const over=d.kcal>g.kcal;
    const lab=dl[(todayIdx-6+i+7)%7];
    return `<div class="d"><div class="col ${d.kcal>0?(over?'over':'ok'):''}" style="height:${h}%"></div><div class="lab">${lab}</div></div>`;
  }).join('');
  const cmp=(cur,prev)=>{if(prev===0)return '';const p=r((cur-prev)/prev*100);return `<div class="cmp ${p>=0?'up':'down'}">${p>=0?'▲':'▼'} ${Math.abs(p)}% vs sem. previa</div>`;};
  body.innerHTML=`
    <div class="card"><h2>Kcal últimos 7 días</h2><div class="week-bars">${bars}</div>
      <div class="kcal-sub">Media ${r(avg.kcal)} kcal/día · Objetivo ${g.kcal}</div></div>
    <div class="stat-grid">
      <div class="stat"><div class="v">${r(avg.kcal)}</div><div class="l">Kcal / día (media)</div>${cmp(wk.kcal,prevWk.kcal)}</div>
      <div class="stat"><div class="v">${r(avg.prot)}g</div><div class="l">Proteína / día</div>${cmp(wk.prot,prevWk.prot)}</div>
      <div class="stat"><div class="v">${r(avg.carb)}g</div><div class="l">Hidratos / día</div>${cmp(wk.carb,prevWk.carb)}</div>
      <div class="stat"><div class="v">${r(avg.fat)}g</div><div class="l">Grasas / día</div>${cmp(wk.fat,prevWk.fat)}</div>
    </div>`+deficits(avg,g,1);
}
function statCards(s,g){
  return `<div class="stat-grid">
    <div class="stat"><div class="v">${r(s.kcal)}</div><div class="l">Kcal (obj. ${g.kcal})</div></div>
    <div class="stat"><div class="v">${r(s.prot)}g</div><div class="l">Proteína (obj. ${g.prot})</div></div>
    <div class="stat"><div class="v">${r(s.carb)}g</div><div class="l">Hidratos (obj. ${g.carb})</div></div>
    <div class="stat"><div class="v">${r(s.fat)}g</div><div class="l">Grasas (obj. ${g.fat})</div></div></div>`;
}
function deficits(s,g){
  const out=[];
  const pct=(v,goal)=>goal>0?v/goal*100:0;
  const checks=[['proteína',s.prot,g.prot,'g'],['hidratos',s.carb,g.carb,'g'],['grasas',s.fat,g.fat,'g'],['kcal',s.kcal,g.kcal,'']];
  checks.forEach(([n,v,goal,u])=>{
    const p=pct(v,goal);
    if(p<75) out.push(`<div class="hint warn">⚠️ Te falta <b>${n}</b>: ${r(v)}${u} de ${goal}${u} (${r(p)}%).</div>`);
    else if(p>115) out.push(`<div class="hint bad">🔺 Te pasas de <b>${n}</b>: ${r(v)}${u} de ${goal}${u} (${r(p)}%).</div>`);
  });
  if(out.length===0) out.push(`<div class="hint">✅ Buen equilibrio: estás cerca de tus objetivos. ¡Sigue así!</div>`);
  return `<div class="card"><h2>Análisis</h2>${out.join('')}</div>`;
}
function saveGoals(){
  DB.goals={kcal:+document.getElementById('gKcal').value||2000,carb:+document.getElementById('gCarb').value||250,
    prot:+document.getElementById('gProt').value||120,fat:+document.getElementById('gFat').value||65};
  save();renderStats();toast('✓ Objetivos guardados');
}

  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='nutriapp-backup.json';a.click();
}

function obRender(){
  const s=OB[obI];

    `<div class="ob-hero"><div class="ob-badge">${s.ic}</div></div>`+
    `<div class="ob-body"><h2>${s.t}</h2><p>${s.h}</p>`+

  setTimeout(()=>{obI++;obRender();c.classList.remove('out');c.classList.add('in');
    setTimeout(()=>c.classList.remove('in'),320);},200);
}
function openOnboard(){
  obI=0;obRender();
  document.getElementById('onboard').classList.add('open');
  const c=document.getElementById('obCard');c.classList.add('in');setTimeout(()=>c.classList.remove('in'),320);
}
function closeOnboard(){document.getElementById('onboard').classList.remove('open');localStorage.setItem('na_onboarded_v2','1');}

renderHoy();
